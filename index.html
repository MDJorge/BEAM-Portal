<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <title>BEAM Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f9; padding: 20px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; transition: all 0.3s ease; }
    .hidden { display: none; }
    .card { border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: auto; background: white; }
    .card-header { background: #004a99; color: white; padding: 20px; border-radius: 12px 12px 0 0; position: relative; }
    .lang-toggle { position: absolute; top: 15px; right: 15px; }
    .form-select-sm { background-color: rgba(255,255,255,0.9); border: none; font-weight: bold; color: #004a99; cursor: pointer; }
    .status-Submitted { color: #198754 !important; font-weight: bold; }
    .status-Not-Submitted { color: #dc3545 !important; font-weight: bold; }
    .section-box { border-radius: 8px; padding: 15px; margin-bottom: 15px; border-inline-start: 5px solid #ccc; background: #fff; }
    .section-forms { border-inline-start-color: #0d6efd; background: #f0f7ff; } 
    .section-extra { border-inline-start-color: #6f42c1; background: #f8f5ff; } 
    .section-uploads { border-inline-start-color: #fd7e14; background: #fff8f0; } 
    .section-title { font-weight: bold; color: #555; margin-bottom: 8px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-action { margin-top: 5px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; padding: 8px 12px; }
    .table td { padding: 10px 8px; border-bottom: 1px solid #e0e0e0; vertical-align: middle; }
    .doc-name { color: #444; font-size: 0.95rem; }
    .doc-link { text-decoration: none; color: #004a99; font-weight: 500; border-bottom: 1px dotted #004a99; }
    .doc-link:hover { color: #002a5c; border-bottom: 1px solid #002a5c; }
    .success-banner { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    .warning-banner { color: #dc3545; background: #fff5f5; border: 1px dashed #dc3545; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.9rem; }
    .transpo-section { border-left: 5px solid #ffc107; background: #fff9e6; margin-bottom: 15px; padding: 15px; border-radius: 8px; }
    body[dir="rtl"] { text-align: right; }
    body[dir="rtl"] .text-end { text-align: left !important; }
  </style>
</head>
<body>

  <div id="searchBox" class="card p-0">
    <div class="card-header">
      <div class="lang-toggle">
        <select id="langSelect" class="form-select form-select-sm" onchange="changeLanguage()">
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ar">🇸🇦 العربية</option>
        </select>
      </div>
      <h3 class="mb-1 mt-2" id="t-title">BEAM Student Portal</h3>
      <p class="mb-0 small" id="t-subtitle">Check your registration progress and missing forms here</p>
    </div>
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label fw-bold" id="t-dob">Student Birthdate</label>
        <input type="date" id="dob" class="form-control">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold" id="t-email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="guardian@email.com">
      </div>
      <button onclick="runSearch()" id="btn" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Check Status</button>
      <div id="error" class="alert alert-warning mt-3 text-center hidden" style="font-size: 0.9rem;"></div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div class="card p-0">
      <div class="card-header">
         <div class="lang-toggle">
          <select id="langSelectResult" class="form-select form-select-sm" onchange="syncLang(this)">
            <option value="en">🇺🇸 English</option>
            <option value="es">🇪🇸 Español</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ar">🇸🇦 العربية</option>
          </select>
        </div>
        <h3 class="mb-1 mt-2" id="t-res-title">Student Portal</h3>
      </div>
      <div class="card-body p-4">
        <div id="content"></div>
        <button onclick="resetSearch()" id="t-back" class="btn btn-link w-100 mt-3 text-decoration-none">← Search Another Student</button>
      </div>
    </div>
  </div>

  <script>

      ar: {

        subtitle: "تحقق من تقدم التسجيل والنماذج المفقودة هنا",

        btnSearching: "جاري البحث...",
        errorConn: "مشكلة في الاتصال. تعذر التحقق تلقائيًا.",
        errorNoStudent: "لم يتم العثور على طالب مطابق. يرجى التحقق من البيانات.",
        manualBtn: "تشغيل البوابة الآمنة ↗",
        statusFor: "الحالة لـ",
        success: "🎉 اكتمل التسجيل!",
        timestamp: "الحالة اعتبارًا من",
        sectForms: "نماذج التسجيل",
        sectExtra: "إقرارات إضافية",
        sectUploads: "تحميل المستندات",
        groupedForms: "معلومات الطالب ونماذج الموافقة",
        btnForms: "إكمال النماذج الآن",
        btnExtra: "أكمل الإقرار هنا",
        btnUploads: "تحميل المستندات المفقودة",
        btnBack: "← البحث عن طالب آخر",
        submitted: "تم الإرسال",
        notSubmitted: "لم يتم الإرسال",
        warning24h: "قد تستغرق التحميلات الجديدة 24 ساعة لتظهر كمرسلة.",
        multipleSub: "يمكنك الإرسال عدة مرات إذا لزم الأمر.",
        transportation: "نقل",
        camp: "موقع المعسكر",
        am: "صباحاً",
        pm: "مساءً",
        change: "تغيير المحطة",
        complete: "أكمل الاستبيان",
        viewStops: "عرض جميع الخيارات",
        warningTranspo: "تستغرق التغييرات 24 ساعة للتحديث.",
        docs: {
          "Parent Med": "الإفراج الطبي من الوالدين",
          "Phys Med": "الإفراج الطبي من الطبيب",
          "Meningitis": "إقرار بلقاح التهاب السحايا",
          "Report Card": "تقرير درجات الصف السابع",
          "Immuno": "سجل التطعيمات",
          "Ins Front": "بطاقة التأمين (الأمام)",
          "Ins Back": "بطاقة التأمين (الخلف)"
        }
      }
    };

    let currentLang = 'en';
    let currentResults = null;

    function syncLang(el) {
      document.getElementById('langSelect').value = el.value;
      document.getElementById('langSelectResult').value = el.value;
      changeLanguage();
    }

    function changeLanguage() {
      currentLang = document.getElementById('langSelect').value;
      const t = TRANSLATIONS[currentLang];
      document.body.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';

      document.getElementById('t-title').innerText = t.title;
      document.getElementById('t-res-title').innerText = t.title;
      document.getElementById('t-subtitle').innerText = t.subtitle;
      document.getElementById('t-dob').innerText = t.dob;
      document.getElementById('t-email').innerText = t.email;
      document.getElementById('btn').innerText = t.btnCheck;
      document.getElementById('t-back').innerText = t.btnBack;

      document.querySelectorAll('.label-transpo').forEach(el => el.innerText = t.transportation);
      document.querySelectorAll('.label-camp').forEach(el => el.innerText = t.camp);
      document.querySelectorAll('.label-am').forEach(el => el.innerText = t.am);
      document.querySelectorAll('.label-pm').forEach(el => el.innerText = t.pm);
      document.querySelectorAll('.label-warning-trans').forEach(el => el.innerText = t.warningTranspo);
      document.querySelectorAll('.label-view-stops').forEach(el => el.innerText = t.viewStops);

      if (currentResults) render(currentResults);
    }

    function resetSearch() {
      document.getElementById('dob').value = '';
      document.getElementById('email').value = '';
      document.getElementById('results').classList.add('hidden');
      document.getElementById('searchBox').classList.remove('hidden');
      document.getElementById('content').innerHTML = '';
      currentResults = null;
    }

    window.receiveData = function(results) {
      const scriptTag = document.getElementById('jsonp_loader');
      if(scriptTag) scriptTag.remove(); 
      currentResults = results;
      render(results);
    };

    function runSearch() {
      const dob = document.getElementById('dob').value;
      const email = document.getElementById('email').value;
      const btn = document.getElementById('btn');
      const errBox = document.getElementById('error');
      const t = TRANSLATIONS[currentLang];
      
      if(!dob || !email) { alert("Please enter both DOB and Email."); return; }
      
      btn.disabled = true;
      btn.innerText = t.btnSearching;
      errBox.classList.add('hidden');

      const script = document.createElement('script');
      script.id = 'jsonp_loader';
      script.setAttribute('crossorigin', 'anonymous');
      script.src = `${SCRIPT_URL}?callback=receiveData&dob=${encodeURIComponent(dob)}&email=${encodeURIComponent(email)}`;
      
      script.onerror = function() {
        btn.disabled = false;
        btn.innerText = t.btnCheck;
        errBox.innerHTML = `<strong>${t.errorConn}</strong>`;
        errBox.classList.remove('hidden');
      };
      document.body.appendChild(script);
    }

    function render(results) {
      const t = TRANSLATIONS[currentLang];
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').innerText = t.btnCheck;

      if (!results || results.length === 0) {
        document.getElementById('error').innerHTML = t.errorNoStudent;
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      const today = new Date();
      const dateStr = (today.getMonth() + 1) + '/' + today.getDate() + '/' + today.getFullYear() + ' 6:00 AM EST';
      let html = '';

      results.forEach(s => {
        const surveyItems = ["Liability Waiver", "Media Release", "Code of Conduct", "Data Consent", "Attendance"];
        const extraItems = ["Meningitis"]; 
        
        const consentData = s.details.filter(d => surveyItems.includes(d.name));
        const extraData = s.details.filter(d => extraItems.includes(d.name));
        const documentData = s.details.filter(d => !surveyItems.includes(d.name) && !extraItems.includes(d.name));

        const missingConsents = consentData.filter(d => d.status !== "Submitted").length;
        const missingExtra = extraData.filter(d => d.status !== "Submitted").length;
        const missingDocs = documentData.filter(d => d.status !== "Submitted").length;

        const consentGroupStatus = missingConsents === 0 ? t.submitted : t.notSubmitted;
        const consentGroupClass = missingConsents === 0 ? "status-Submitted" : "status-Not-Submitted";
        const isFullyComplete = (missingConsents === 0 && missingExtra === 0 && missingDocs === 0);

        html += `<h4 class="text-primary fw-bold text-center mb-1">${t.statusFor} ${s.firstName}</h4>`;
        html += `<div class="text-center mb-3"><span class="badge bg-secondary rounded-pill">${s.program}</span></div>`;

        if (isFullyComplete) html += `<div class="success-banner">${t.success}</div>`;
        html += `<p class="timestamp text-center">${t.timestamp}: ${dateStr}</p>`;

        html += `<div class="warning-banner">
                   ⚠️ <strong>${t.warning24h}</strong><br>
                   <span style="color: #666; font-size: 0.85rem;">${t.multipleSub}</span>
                 </div>`;

        // SECTION 1: FORMS
        html += `<div class="section-box section-forms">
                  <div class="section-title">${t.sectForms}</div>
                  <table class="table table-sm mb-0">
                    <tr><td class="doc-name">${t.groupedForms}</td><td class="${consentGroupClass} text-end">${consentGroupStatus}</td></tr>
                  </table>`;
        if (missingConsents > 0) html += `<a href="https://www.surveymonkey.com/r/R3PW5S8" target="_blank" class="btn btn-primary btn-action w-100 mt-2">${t.btnForms}</a>`;
        html += `</div>`;

        // SECTION 2: EXTRA
        if (extraData.length > 0) {
          html += `<div class="section-box section-extra"><div class="section-title">${t.sectExtra}</div><table class="table table-sm mb-0">`;
          extraData.forEach(d => {
              const statusClass = d.status === 'Submitted' ? 'status-Submitted' : 'status-Not-Submitted';
              html += `<tr><td class="doc-name">${t.docs[d.name] || d.name}</td><td class="${statusClass} text-end">${d.status === 'Submitted' ? t.submitted : t.notSubmitted}</td></tr>`;
          });
          html += `</table>`;
          if (missingExtra > 0) html += `<a href="https://www.surveymonkey.com/r/9GYMKBM" target="_blank" class="btn btn-info btn-action w-100 mt-2 text-dark" style="background-color: #e0cffc; border: none;">${t.btnExtra}</a>`;
          html += `</div>`;
        }

        // SECTION 3: DOCUMENTS
        html += `<div class="section-box section-uploads"><div class="section-title">${t.sectUploads}</div><table class="table table-sm mb-0">`;
        documentData.forEach(d => {
            let name = t.docs[d.name] || d.name;
            if (d.name === "Parent Med") name = `<a href="https://drive.google.com/file/d/1_wGr6RFSioXv70VeNOmugD0iUdQdIzJ6/view" target="_blank" class="doc-link">${name}</a>`;
            if (d.name === "Phys Med") name = `<a href="https://drive.google.com/file/d/1NjZ0nRDhwQ4Sf_rYmunnjUnNG5rRHPRD/view" target="_blank" class="doc-link">${name}</a>`;
            html += `<tr><td class="doc-name">${name}</td><td class="${d.status === 'Submitted' ? 'status-Submitted' : 'status-Not-Submitted'} text-end">${d.status === 'Submitted' ? t.submitted : t.notSubmitted}</td></tr>`;
        });
        html += `</table>`;
        // BUTTON IS NOW INSIDE THE DOCUMENT BOX AT THE BOTTOM
        if (missingDocs > 0) html += `<a href="https://www.surveymonkey.com/r/9GYMKBM" target="_blank" class="btn btn-warning btn-action w-100 mt-2 text-dark">${t.btnUploads}</a>`;
        html += `</div>`;

        // --- TRANSPORTATION SECTION (NOW BELOW UPLOADS) ---
        if (s.program === "Discovery" && s.transportation) {
            const loc = (s.transportation.location || "").toLowerCase();
            const isUptown = loc.includes("uptown");
            const campAddr = isUptown ? "Comp Sci High, South Bronx" : "New Design High, Lower East Side";
            const surveyUrl = isUptown ? "https://www.surveymonkey.com/r/RRNN52J" : "https://www.surveymonkey.com/r/RSHRSgQ";
            const mStop = s.transportation.morning || "Missing";
            const aStop = s.transportation.afternoon || "Missing";
            const hasSub = (mStop !== "Missing" && mStop !== "") && (aStop !== "Missing" && aStop !== "");

            html += `<div class="transpo-section">
                      <h6 class="fw-bold label-transpo">${t.transportation}</h6>
                      <p class="small mb-2"><strong class="label-camp">${t.camp}</strong>: ${campAddr}</p>
                      <div class="row mb-3">
                        <div class="col-6 small"><strong class="label-am">${t.am}</strong>:<br>${mStop}</div>
                        <div class="col-6 small"><strong class="label-pm">${t.pm}</strong>:<br>${aStop}</div>
                      </div>
                      <div class="d-grid gap-2">
                        <a href="${surveyUrl}" target="_blank" class="btn btn-sm ${hasSub ? 'btn-outline-primary' : 'btn-primary'}">${hasSub ? t.change : t.complete}</a>
                        <button class="btn btn-sm btn-link text-decoration-none p-0 text-start label-view-stops" onclick="this.nextElementSibling.classList.toggle('hidden')">${t.viewStops}</button>
                        <div class="hidden mt-2 small border-top pt-2">
                          <table class="table table-borderless table-sm mb-0" style="font-size: 0.75rem;">
                            <tr><td><strong>Prospect Park (B/Q):</strong></td><td>8:20 AM @ Lincoln Market (33 Lincoln Rd)</td></tr>
                          </table>
                        </div>
                      </div>
                      <div class="mt-2 text-muted label-warning-trans" style="font-size: 0.7rem; font-style: italic;">⚠️ ${t.warningTranspo}</div>
                    </div>`;
        }

        html += `<hr class="my-4">`;
      });

      document.getElementById('content').innerHTML = html;
      document.getElementById('searchBox').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
    }
  </script>
</body>
</html>
