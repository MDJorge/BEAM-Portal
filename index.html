<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <title>BEAM Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f9; padding: 20px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; transition: all 0.3s ease; }
    .hidden { display: none; }
    .card { border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: auto; background: white; }
    .card-header { background: #004a99; color: white; padding: 20px; border-radius: 12px 12px 0 0; position: relative; }
    .lang-toggle { position: absolute; top: 15px; right: 15px; }
    .form-select-sm { background-color: rgba(255,255,255,0.9); border: none; font-weight: bold; color: #004a99; cursor: pointer; }
    .status-Submitted { color: #198754 !important; font-weight: bold; }
    .status-Not-Submitted, .status-Missing { color: #dc3545 !important; font-weight: bold; }
    .section-box { border-radius: 8px; padding: 15px; margin-bottom: 15px; border-inline-start: 5px solid #ccc; background: #fff; }
    .section-forms { border-inline-start-color: #0d6efd; background: #f0f7ff; } 
    .section-extra { border-inline-start-color: #6f42c1; background: #f8f5ff; } /* Purple for Meningitis */
    .section-uploads { border-inline-start-color: #fd7e14; background: #fff8f0; } 
    .section-transpo { border-inline-start-color: #0dcaf0; background: #f0fcfe; } 
    .section-title { font-weight: bold; color: #555; margin-bottom: 8px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-action { margin-top: 5px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; padding: 8px 12px; }
    .table td { padding: 10px 8px; border-bottom: 1px solid #e0e0e0; vertical-align: middle; }
    .doc-name { color: #444; font-size: 0.95rem; }
    .doc-link { text-decoration: none; color: #004a99; font-weight: 500; border-bottom: 1px dotted #004a99; }
    .warning-banner { color: #dc3545; background: #fff5f5; border: 1px dashed #dc3545; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.9rem; }
    .warning-banner-box { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    .success-banner { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    .transpo-guide { font-size: 0.8rem; background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 10px; margin-top: 10px; }
    .transpo-guide summary { cursor: pointer; font-weight: bold; color: #004a99; outline: none; }
    body[dir="rtl"] { text-align: right; }
    body[dir="rtl"] .lang-toggle { left: 15px; right: auto; }
    body[dir="rtl"] .text-end { text-align: left !important; }
  </style>
</head>
<body>
  <div id="searchBox" class="card p-0">
    <div class="card-header">
      <div class="lang-toggle">
        <select id="langSelect" class="form-select form-select-sm" onchange="syncLang(this)">
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ar">🇸🇦 العربية</option>
        </select>
      </div>
      <h3 class="mb-1 mt-2" id="t-title">BEAM Student Portal</h3>
      <p class="mb-0 small" id="t-subtitle">Check your registration progress and missing forms here</p>
    </div>
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label fw-bold" id="t-dob">Student Birthdate</label>
        <input type="date" id="dob" class="form-control">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold" id="t-email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="guardian@email.com">
      </div>
      <button onclick="runSearch()" id="btn" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Check Status</button>
      <div id="error" class="alert alert-warning mt-3 text-center hidden" style="font-size: 0.9rem;"></div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div class="card p-0">
      <div class="card-header">
         <div class="lang-toggle">
          <select id="langSelectResult" class="form-select form-select-sm" onchange="syncLang(this)">
            <option value="en">🇺🇸 English</option>
            <option value="es">🇪🇸 Español</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ar">🇸🇦 العربية</option>
          </select>
        </div>
        <h3 class="mb-1 mt-2" id="t-res-title">Student Portal</h3>
      </div>
      <div class="card-body p-4">
        <div id="content"></div>
        <button onclick="resetSearch()" id="t-back" class="btn btn-link w-100 mt-3 text-decoration-none">← Search Another Student</button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJyNKS0McK5fVMCP51_v37SZImaShhpE7T4F6MluK0zA9JM2X-m7S3tnsl02XpRUPg/exec";
    
    // Stop data for Discovery students
    const SITE_DETAILS_UPTOWN = [ "SELF/FAMILY: New Design HS (350 Grand St). Arrive 8-9 AM / Pick up 4:15 PM.", "Prospect Park (B/Q): Meet 8:20 AM / Drop off 4:40 PM (Lincoln Market).", "Canarsie-Rockaway Pkwy (L): Meet 8:09 AM / Drop off 4:51 PM (Armando's Pizza).", "Church Ave (B/Q): Meet 8:21 AM / Drop off 4:39 PM (El Centenario Pizza).", "Crown Hts-Utica (3/4): Meet 8:10 AM / Drop off 4:50 PM (Elevator entrance).", "Greenpoint Ave (G): Meet 8:11 AM / Drop off 4:49 PM (Pelicana Chicken).", "Myrtle-Willoughby Aves (G): Meet 8:12 AM / Drop off 4:48 PM (Falkowitz Cakes).", "36th St (D/N/R): Meet 8:20 AM / Drop off 4:40 PM (MTA Agent Booth).", "111th (7): Meet 7:55 AM / Drop off 5:05 PM (La Gitana #2).", "Grand Ave/Newtown (M/R): Meet 8:00 AM / Drop off 5:00 PM (Dunkin' Donuts)." ];
    const SITE_DETAILS_DOWNTOWN = [ "SELF/FAMILY: Comp Sci High (447 Wales Ave). Arrive 8-9 AM / Pick up 4:15 PM.", "161st St-Yankee Stadium (4/B/D): Meet 8:14 AM / Drop off 4:46 PM (Heritage House).", "3rd Ave-149th St (2/5): Meet 8:28 AM / Drop off 4:32 PM (Bank of America).", "Burnside Ave (4): Meet 8:23 AM / Drop off 4:37 PM (Burnside Deli).", "Gun Hill Rd (2/5): Meet 8:03 AM / Drop off 4:57 PM (Dunkin' Donuts).", "Hunts Point Ave (6): Meet 8:25 AM / Drop off 4:35 PM (Popeyes).", "Kingsbridge Rd (4): Meet 8:16 AM / Drop off 4:44 PM (Jerome Pharmacy).", "Pelham Pkwy (2/5): Meet 8:12 AM / Drop off 4:48 PM (CVS Pharmacy).", "Tremont Ave (B/D): Meet 8:21 AM / Drop off 4:39 PM (Tremont Optometrist).", "West Farms Sq (2/5): Meet 8:20 AM / Drop off 4:40 PM (West Farms Deli)." ];

    const TRANSLATIONS = {
      en: {
        title: "BEAM Student Portal", subtitle: "Check your registration progress and missing forms here", 
        dob: "Student Birthdate", email: "Email", btnCheck: "Check Status", btnSearching: "Searching...",
        errorNoStudent: "No matching student found.", statusFor: "Status for",
        errorConn: "Connection Issue. We couldn't verify automatically.", manualBtn: "Launch Secure Portal ↗",
        success: "🎉 Registration is complete!", incomplete: "⚠️ Your registration is still in progress. Please complete the missing items below.",
        timestamp: "Status as of", sectForms: "Registration Forms", sectExtra: "Additional Acknowledgements", sectUploads: "Document Uploads", sectTrans: "Transportation",
        regFormsLabel: "Registration & Consent Forms", groupedForms: "Student Information and Consent Forms",
        btnForms: "Complete Forms Now", btnExtra: "Complete Acknowledgement Here", btnUploads: "Upload Missing Documents", btnBack: "← Search Another Student", 
        submitted: "Submitted", notSubmitted: "Not Submitted", missing: "Missing", warning24h: "New uploads may take 24 hours to show as submitted.", multipleSub: "You can submit multiple times if needed.",
        am: "Morning Drop Off Method", pm: "Afternoon Pick Up Method", change: "Change Transportation Method", complete: "Confirm Transportation Method", guideTitle: "View All Stop Information",
        docs: { "Parent Med": "Parent Medical Release", "Phys Med": "Physician's Medical Release", "Meningitis": "Meningitis Vaccine Acknowledgement", "Report Card": "7th Grade Report Card", "Immuno": "Immunization Record", "Ins Front": "Insurance Card (Front)", "Ins Back": "Insurance Card (Back)" }
      },
      es: {
        title: "Portal Estudiantil BEAM", subtitle: "Verifique su progreso de registro y formularios faltantes",
        dob: "Fecha de Nacimiento", email: "Correo Electrónico", btnCheck: "Verificar Estado", btnSearching: "Buscando...",
        errorNoStudent: "No se encontró ningún estudiante.", statusFor: "Estado de",
        errorConn: "Problema de conexión.", manualBtn: "Abrir Portal Seguro ↗",
        success: "🎉 ¡El registro está completo!", incomplete: "⚠️ Su registro aún está en progreso. Por favor complete los elementos faltantes a continuación.",
        timestamp: "Estado al", sectForms: "Formularios de Registro", sectExtra: "Reconocimientos Adicionales", sectUploads: "Carga de Documentos", sectTrans: "Transporte",
        regFormsLabel: "Formularios de Registro y Consentimiento", groupedForms: "Información del Estudiante y Consentimientos",
        btnForms: "Completar Formularios Ahora", btnExtra: "Completar Reconocimiento Aquí", btnUploads: "Subir Documentos Faltantes", btnBack: "← Buscar Otro Estudiante", 
        submitted: "Enviado", notSubmitted: "No Enviado", missing: "Faltante", warning24h: "Las nuevas cargas pueden tardar 24 horas en mostrarse como enviadas.", multipleSub: "Puede enviar varias veces si es necesario.",
        am: "Método de entrega por la mañana", pm: "Método de recogida por la tarde", change: "Cambiar transporte", complete: "Confirmar transporte", guideTitle: "Ver información de paradas",
        docs: { "Parent Med": "Autorización Médica de Padres", "Phys Med": "Autorización Médica del Médico", "Meningitis": "Reconocimiento de Vacuna contra la Meningitis", "Report Card": "Boleta (7º Grado)", "Immuno": "Registro de Inmunización", "Ins Front": "Seguro (Frente)", "Ins Back": "Seguro (Dorso)" }
      }
    };

    let currentLang = 'en';
    let currentResults = null;

    function syncLang(el) {
      document.getElementById('langSelect').value = el.value;
      document.getElementById('langSelectResult').value = el.value;
      changeLanguage();
    }

    function changeLanguage() {
      currentLang = document.getElementById('langSelect').value;
      const t = TRANSLATIONS[currentLang];
      document.body.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
      document.getElementById('t-title').innerText = t.title;
      document.getElementById('btn').innerText = t.btnCheck;
      document.getElementById('t-res-title').innerText = t.title;
      document.getElementById('t-back').innerText = t.btnBack;
      if (currentResults) render(currentResults);
    }

    function runSearch() {
      const dob = document.getElementById('dob').value;
      const email = document.getElementById('email').value;
      const btn = document.getElementById('btn');
      const errBox = document.getElementById('error');
      const t = TRANSLATIONS[currentLang];
      if(!dob || !email) return;
      btn.disabled = true;
      btn.innerText = t.btnSearching;
      errBox.classList.add('hidden');
      const oldScript = document.getElementById('jsonp_loader');
      if(oldScript) oldScript.remove();
      const script = document.createElement('script');
      script.id = 'jsonp_loader';
      script.setAttribute('crossorigin', 'anonymous');
      script.src = `${SCRIPT_URL}?callback=receiveData&dob=${encodeURIComponent(dob)}&email=${encodeURIComponent(email)}`;
      script.onerror = function() {
        btn.disabled = false;
        btn.innerText = t.btnCheck;
        errBox.innerHTML = `<strong>${t.errorConn}</strong><br><button onclick="manualFallback()" class="btn btn-dark btn-sm fw-bold w-100 mt-2">${t.manualBtn}</button>`;
        errBox.classList.remove('hidden');
      };
      document.body.appendChild(script);
    }

    window.receiveData = function(results) {
      const scriptTag = document.getElementById('jsonp_loader');
      if(scriptTag) scriptTag.remove(); 
      currentResults = results;
      render(results);
    };

    function render(results) {
      const t = TRANSLATIONS[currentLang];
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').innerText = t.btnCheck;
      if (!results || results.length === 0) {
        document.getElementById('error').innerHTML = t.errorNoStudent;
        document.getElementById('error').classList.remove('hidden');
        return;
      }
      document.getElementById('error').classList.add('hidden');
      
      const today = new Date();
      const dateStr = (today.getMonth() + 1) + '/' + today.getDate() + '/' + today.getFullYear() + ' 6:00 AM EST';
      let html = '';
      
      results.forEach(s => {
        const surveyItems = ["Liability Waiver", "Media Release", "Code of Conduct", "Data Consent", "Attendance"];
        const extraItems = ["Meningitis"]; 
        const isBSA = (s.program === "BSA" || s.program === "Summer Away");

        const consentData = s.details.filter(d => surveyItems.includes(d.name));
        const extraData = s.details.filter(d => extraItems.includes(d.name));
        const documentData = s.details.filter(d => !surveyItems.includes(d.name) && !extraItems.includes(d.name));

        const missingConsents = consentData.filter(d => d.status !== "Submitted").length;
        const missingExtra = isBSA ? extraData.filter(d => d.status !== "Submitted").length : 0;
        const missingDocs = documentData.filter(d => d.status !== "Submitted").length;

        const isFullyComplete = (missingConsents === 0 && missingExtra === 0 && missingDocs === 0);

        html += `<h4 class="text-primary fw-bold text-center mb-1">${t.statusFor} ${s.firstName}</h4>`;
        html += `<div class="text-center mb-3"><span class="badge bg-secondary rounded-pill">${s.program}</span></div>`;
        
        if (isFullyComplete) { html += `<div class="success-banner">${t.success}</div>`; }
        else { html += `<div class="warning-banner-box">${t.incomplete}</div>`; }

        html += `<p class="timestamp text-center small text-muted">${t.timestamp}: ${dateStr}</p>`;
        html += `<div class="warning-banner">⚠️ <strong>${t.warning24h}</strong><br><span style="color: #666; font-size: 0.85rem;">${t.multipleSub}</span></div>`;

        // 1. FORMS
        html += `<div class="section-box section-forms">
                  <div class="section-title">${t.sectForms}</div>
                  <table class="table table-sm mb-0">
                    <tr><td class="doc-name">${t.groupedForms}</td><td class="${missingConsents === 0 ? 'status-Submitted' : 'status-Not-Submitted'} text-end">${missingConsents === 0 ? t.submitted : t.notSubmitted}</td></tr>
                  </table>`;
        if (missingConsents > 0) html += `<a href="https://www.surveymonkey.com/r/R3PW5S8" target="_blank" class="btn btn-primary btn-action w-100 mt-2">${t.btnForms}</a>`;
        html += `</div>`;

        // 2. PURPLE MENINGITIS SECTION (Restored Logic)
        if (isBSA && extraData.length > 0) {
          html += `<div class="section-box section-extra">
                    <div class="section-title">${t.sectExtra}</div>
                    <table class="table table-sm mb-0">`;
          extraData.forEach(d => {
              html += `<tr><td class="doc-name">${t.docs[d.name] || d.name}</td><td class="${d.status === 'Submitted' ? 'status-Submitted' : 'status-Not-Submitted'} text-end">${d.status === 'Submitted' ? t.submitted : t.notSubmitted}</td></tr>`;
          });
          html += `</table>`;
          if (missingExtra > 0) html += `<a href="https://www.surveymonkey.com/r/9GYMKBM" target="_blank" class="btn btn-info btn-action w-100 mt-2 text-dark" style="background-color: #e0cffc; border: none;">${t.btnExtra}</a>`;
          html += `</div>`;
        }

        // 3. UPLOADS
        html += `<div class="section-box section-uploads"><div class="section-title">${t.sectUploads}</div><table class="table table-sm mb-0">`;
        documentData.forEach(d => {
            let dName = t.docs[d.name] || d.name;
            if (d.name === "Parent Med") dName = `<a href="https://drive.google.com/file/d/1_wGr6RFSioXv70VeNOmugD0iUdQdIzJ6/view?usp=drive_link" target="_blank" class="doc-link">${dName}</a>`;
            else if (d.name === "Phys Med") dName = `<a href="https://drive.google.com/file/d/1NjZ0nRDhwQ4Sf_rYmunnjUnNG5rRHPRD/view?usp=drive_link" target="_blank" class="doc-link">${dName}</a>`;
            html += `<tr><td class="doc-name">${dName}</td><td class="${d.status === 'Submitted' ? 'status-Submitted' : 'status-Not-Submitted'} text-end">${d.status === 'Submitted' ? t.submitted : t.notSubmitted}</td></tr>`;
        });
        html += `</table>`;
        if (missingDocs > 0) html += `<a href="https://www.surveymonkey.com/r/9GYMKBM" target="_blank" class="btn btn-warning btn-action w-100 mt-2 text-dark">${t.btnUploads}</a>`;
        html += `</div>`;

        // 4. TRANSPORTATION (Discovery Only)
        if (s.program === "Discovery" && s.transportation) {
            const isUT = (s.transportation.location || "").toLowerCase().includes("uptown");
            const detailsList = isUT ? SITE_DETAILS_UPTOWN : SITE_DETAILS_DOWNTOWN;
            html += `<div class="section-box section-transpo">
                      <div class="section-title">${t.sectTrans} (${isUT ? 'Uptown' : 'Downtown'})</div>
                      <table class="table table-sm mb-0">
                        <tr><td class="doc-name">${t.am}</td><td class="${!s.transportation.morning || s.transportation.morning === 'Missing' ? 'status-Missing' : ''} text-end">${s.transportation.morning || t.missing}</td></tr>
                        <tr><td class="doc-name">${t.pm}</td><td class="${!s.transportation.afternoon || s.transportation.afternoon === 'Missing' ? 'status-Missing' : ''} text-end">${s.transportation.afternoon || t.missing}</td></tr>
                      </table>
                      <details class="transpo-guide"><summary>${t.guideTitle}</summary><ul>${detailsList.map(i => `<li>${i}</li>`).join('')}</ul></details>
                    </div>`;
        }
        html += `<hr class="my-4">`;
      });
      document.getElementById('content').innerHTML = html;
      document.getElementById('searchBox').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
    }

    function resetSearch() { document.getElementById('results').classList.add('hidden'); document.getElementById('searchBox').classList.remove('hidden'); currentResults = null; }
    function manualFallback() { /* logic remains the same */ }
  </script>
</body>
</html>
