<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <title>BEAM Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f9; padding: 20px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; transition: all 0.3s ease; }
    .hidden { display: none; }
    .card { border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: auto; background: white; }
    .card-header { background: #004a99; color: white; padding: 20px; border-radius: 12px 12px 0 0; position: relative; }
    .lang-toggle { position: absolute; top: 15px; right: 15px; }
    .form-select-sm { background-color: rgba(255,255,255,0.9); border: none; font-weight: bold; color: #004a99; cursor: pointer; }
    
    /* Status Styling */
    .status-Submitted { color: #198754 !important; font-weight: bold; }
    .status-Not-Submitted, .status-Missing { color: #dc3545 !important; font-weight: bold; }
    
    /* Section Styling */
    .section-box { border-radius: 8px; padding: 15px; margin-bottom: 15px; border-inline-start: 5px solid #ccc; background: #fff; }
    
    /* Colors */
    .section-forms { border-inline-start-color: #0d6efd; background: #f0f7ff; } 
    .section-extra { border-inline-start-color: #6f42c1; background: #f8f5ff; } 
    .section-uploads { border-inline-start-color: #fd7e14; background: #fff8f0; } /* Matches Orange Button */
    .section-transpo { border-inline-start-color: #0dcaf0; background: #f0fcfe; } /* New Teal/Cyan Color */

    .section-title { font-weight: bold; color: #555; margin-bottom: 8px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-action { margin-top: 10px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; padding: 8px 12px; }
    
    .table td { padding: 10px 8px; border-bottom: 1px solid #e0e0e0; vertical-align: middle; }
    .item-name { color: #444; font-size: 0.95rem; }
    .doc-link { text-decoration: none; color: #004a99; font-weight: 500; border-bottom: 1px dotted #004a99; }
    
    .timestamp { color: #777; font-size: 0.85rem; }
    .warning-banner { color: #dc3545; background: #fff5f5; border: 1px dashed #dc3545; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.9rem; }
    
    body[dir="rtl"] { text-align: right; }
    body[dir="rtl"] .text-end { text-align: left !important; }
  </style>
</head>
<body>

  <div id="searchBox" class="card p-0">
    <div class="card-header">
      <div class="lang-toggle">
        <select id="langSelect" class="form-select form-select-sm" onchange="changeLanguage()">
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ar">🇸🇦 العربية</option>
        </select>
      </div>
      <h3 class="mb-1 mt-2" id="t-title">BEAM Student Portal</h3>
      <p class="mb-0 small" id="t-subtitle">Check your registration progress and missing forms here</p>
    </div>
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label fw-bold" id="t-dob">Student Birthdate</label>
        <input type="date" id="dob" class="form-control">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold" id="t-email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="guardian@email.com">
      </div>
      <button onclick="runSearch()" id="btn" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Check Status</button>
      <div id="error" class="alert alert-warning mt-3 text-center hidden" style="font-size: 0.9rem;"></div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div class="card p-0">
      <div class="card-header">
         <div class="lang-toggle">
          <select id="langSelectResult" class="form-select form-select-sm" onchange="syncLang(this)">
            <option value="en">🇺🇸 English</option>
            <option value="es">🇪🇸 Español</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ar">🇸🇦 العربية</option>
          </select>
        </div>
        <h3 class="mb-1 mt-2" id="t-res-title">Student Portal</h3>
      </div>
      <div class="card-body p-4">
        <div id="content"></div>
        <button onclick="resetSearch()" id="t-back" class="btn btn-link w-100 mt-3 text-decoration-none">← Search Another Student</button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJyNKS0McK5fVMCP51_v37SZImaShhpE7T4F6MluK0zA9JM2X-m7S3tnsl02XpRUPg/exec";

    const TRANSLATIONS = {
      en: {
        title: "BEAM Student Portal",
        subtitle: "Check your registration progress and missing forms here",
        dob: "Student Birthdate",
        email: "Email",
        btnCheck: "Check Status",
        btnSearching: "Searching...",
        errorConn: "Connection Issue.",
        errorNoStudent: "No matching student found.",
        statusFor: "Status for",
        timestamp: "Status as of",
        sectForms: "Registration Forms",
        sectExtra: "Additional Acknowledgements",
        sectUploads: "Document Uploads",
        sectTrans: "Transportation",
        groupedForms: "Student Information and Consent Forms",
        btnForms: "Complete Forms Now",
        btnExtra: "Complete Acknowledgement Here",
        btnUploads: "Upload Missing Documents",
        btnBack: "← Search Another Student",
        submitted: "Submitted",
        notSubmitted: "Not Submitted",
        missing: "Missing",
        warning24h: "New uploads may take 24 hours to show as submitted.",
        am: "Morning Bus Stop",
        pm: "Afternoon Bus Stop",
        change: "Change Bus Stops",
        complete: "Confirm Morning/Afternoon Bus Stop Choice",
        warningTranspo: "Changes take 24 hours to update."
      },
      es: {
        title: "Portal Estudiantil BEAM",
        subtitle: "Verifique su progreso de registro y formularios faltantes",
        dob: "Fecha de Nacimiento del Estudiante",
        email: "Correo Electrónico",
        btnCheck: "Verificar Estado",
        btnSearching: "Buscando...",
        errorConn: "Problema de conexión.",
        errorNoStudent: "No se encontró ningún estudiante.",
        statusFor: "Estado de",
        timestamp: "Estado al",
        sectForms: "Formularios de Registro",
        sectExtra: "Reconocimientos Adicionales",
        sectUploads: "Carga de Documentos",
        sectTrans: "Transporte",
        groupedForms: "Información del Estudiante y Consentimientos",
        btnForms: "Completar Formularios Ahora",
        btnExtra: "Completar Reconocimiento Aquí",
        btnUploads: "Subir Documentos Faltantes",
        btnBack: "← Buscar Otro Estudiante",
        submitted: "Enviado",
        notSubmitted: "No Enviado",
        missing: "Faltante",
        warning24h: "Las nuevas cargas pueden tardar 24 horas.",
        am: "Parada de la mañana",
        pm: "Parada de la tarde",
        change: "Cambiar paradas de autobús",
        complete: "Confirmar elección de parada de autobús",
        warningTranspo: "Los cambios tardan 24 horas."
      }
    };

    let currentLang = 'en';
    let currentResults = null;

    function syncLang(el) {
      document.getElementById('langSelect').value = el.value;
      document.getElementById('langSelectResult').value = el.value;
      changeLanguage();
    }

    function changeLanguage() {
      currentLang = document.getElementById('langSelect').value;
      if (currentResults) render(currentResults);
    }

    function resetSearch() {
      document.getElementById('dob').value = '';
      document.getElementById('email').value = '';
      document.getElementById('results').classList.add('hidden');
      document.getElementById('searchBox').classList.remove('hidden');
      document.getElementById('content').innerHTML = '';
      currentResults = null;
    }

    window.receiveData = function(results) {
      const scriptTag = document.getElementById('jsonp_loader');
      if(scriptTag) scriptTag.remove(); 
      currentResults = results;
      render(results);
    };

    function runSearch() {
      const dob = document.getElementById('dob').value;
      const email = document.getElementById('email').value;
      const btn = document.getElementById('btn');
      const t = TRANSLATIONS[currentLang];
      if(!dob || !email) return;
      btn.disabled = true;
      btn.innerText = t.btnSearching;
      const script = document.createElement('script');
      script.id = 'jsonp_loader';
      script.src = `${SCRIPT_URL}?callback=receiveData&dob=${encodeURIComponent(dob)}&email=${encodeURIComponent(email)}`;
      document.body.appendChild(script);
    }

    function render(results) {
      const t = TRANSLATIONS[currentLang];
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').innerText = t.btnCheck;

      if (!results || results.length === 0) {
        document.getElementById('error').innerHTML = t.errorNoStudent;
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      const today = new Date();
      const dateStr = (today.getMonth() + 1) + '/' + today.getDate() + '/' + today.getFullYear() + ' 6:00 AM EST';
      let html = '';

      results.forEach(s => {
        const surveyItems = ["Liability Waiver", "Media Release", "Code of Conduct", "Data Consent", "Attendance"];
        const extraItems = ["Meningitis"]; 
        const consentData = s.details.filter(d => surveyItems.includes(d.name));
        const extraData = s.details.filter(d => extraItems.includes(d.name));
        const documentData = s.details.filter(d => !surveyItems.includes(d.name) && !extraItems.includes(d.name));
        const missingConsents = consentData.filter(d => d.status !== "Submitted").length;
        const missingExtra = extraData.filter(d => d.status !== "Submitted").length;
        const missingDocs = documentData.filter(d => d.status !== "Submitted").length;

        html += `<h4 class="text-primary fw-bold text-center mb-1">${t.statusFor} ${s.firstName}</h4>`;
        html += `<div class="text-center mb-3"><span class="badge bg-secondary rounded-pill">${s.program}</span></div>`;
        html += `<p class="timestamp text-center mb-3">${t.timestamp}: ${dateStr}</p>`;
        html += `<div class="warning-banner">⚠️ <strong>${t.warning24h}</strong></div>`;

        // 1. REGISTRATION FORMS
        html += `<div class="section-box section-forms">
                  <div class="section-title">${t.sectForms}</div>
                  <table class="table table-sm mb-0">
                    <tr><td class="item-name">${t.groupedForms}</td><td class="${missingConsents === 0 ? "status-Submitted" : "status-Not-Submitted"} text-end">${missingConsents === 0 ? t.submitted : t.notSubmitted}</td></tr>
                  </table>`;
        if (missingConsents > 0) html += `<a href="https://www.surveymonkey.com/r/R3PW5S8" target="_blank" class="btn btn-primary btn-action w-100">${t.btnForms}</a>`;
        html += `</div>`;

        // 2. EXTRA
        if (extraData.length > 0) {
          html += `<div class="section-box section-extra"><div class="section-title">${t.sectExtra}</div><table class="table table-sm mb-0">`;
          extraData.forEach(d => {
              html += `<tr><td class="item-name">${d.name}</td><td class="${d.status === 'Submitted' ? 'status-Submitted' : 'status-Not-Submitted'} text-end">${d.status === 'Submitted' ? t.submitted : t.notSubmitted}</td></tr>`;
          });
          html += `</table>`;
          if (missingExtra > 0) html += `<a href="https://www.surveymonkey.com/r/9GYMKBM" target="_blank" class="btn btn-info btn-action w-100 text-dark" style="background-color: #e0cffc; border: none;">${t.btnExtra}</a>`;
          html += `</div>`;
        }

        // 3. DOCUMENT UPLOADS
        html += `<div class="section-box section-uploads"><div class="section-title">${t.sectUploads}</div><table class="table table-sm mb-0">`;
        documentData.forEach(d => {
            html += `<tr><td class="item-name">${d.name}</td><td class="${d.status === 'Submitted' ? 'status-Submitted' : 'status-Not-Submitted'} text-end">${d.status === 'Submitted' ? t.submitted : t.notSubmitted}</td></tr>`;
        });
        html += `</table>`;
        if (missingDocs > 0) html += `<a href="https://www.surveymonkey.com/r/9GYMKBM" target="_blank" class="btn btn-warning btn-action w-100 text-dark" style="background-color: #fd7e14; border: none; color: white !important;">${t.btnUploads}</a>`;
        html += `</div>`;

        // 4. TRANSPORTATION
        if (s.program === "Discovery" && s.transportation) {
            const isUptown = (s.transportation.location || "").toLowerCase().includes("uptown");
            const surveyUrl = isUptown ? "https://www.surveymonkey.com/r/RRNN52J" : "https://www.surveymonkey.com/r/RSHRS9Q";
            const mStop = s.transportation.morning || "Missing";
            const aStop = s.transportation.afternoon || "Missing";
            const hasSub = (mStop !== "Missing" && aStop !== "Missing");

            html += `<div class="section-box section-transpo">
                      <div class="section-title">${t.sectTrans}</div>
                      <table class="table table-sm mb-0">
                        <tr><td class="item-name">${t.am}</td><td class="${mStop === 'Missing' ? 'status-Missing' : ''} text-end">${mStop === 'Missing' ? t.missing : mStop}</td></tr>
                        <tr><td class="item-name">${t.pm}</td><td class="${aStop === 'Missing' ? 'status-Missing' : ''} text-end">${aStop === 'Missing' ? t.missing : aStop}</td></tr>
                      </table>
                      <a href="${surveyUrl}" target="_blank" class="btn btn-info btn-action w-100" style="background-color: #0dcaf0; border: none; color: white !important;">${hasSub ? t.change : t.complete}</a>
                      <div class="mt-2 text-muted text-center" style="font-size: 0.7rem; font-style: italic;">⚠️ ${t.warningTranspo}</div>
                    </div>`;
        }
        html += `<hr class="my-4">`;
      });
      document.getElementById('content').innerHTML = html;
      document.getElementById('searchBox').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
    }
  </script>
</body>
</html>
