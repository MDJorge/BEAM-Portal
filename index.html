<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <title>BEAM Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f9; padding: 20px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; transition: all 0.3s ease; }
    .hidden { display: none; }
    .card { border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: auto; background: white; }
    .card-header { background: #004a99; color: white; padding: 20px; border-radius: 12px 12px 0 0; position: relative; }
    .lang-toggle { position: absolute; top: 15px; right: 15px; }
    .form-select-sm { background-color: rgba(255,255,255,0.9); border: none; font-weight: bold; color: #004a99; cursor: pointer; }
    .status-Submitted { color: #198754 !important; font-weight: bold; }
    .status-Not-Submitted, .status-Missing { color: #dc3545 !important; font-weight: bold; }
    .section-box { border-radius: 8px; padding: 15px; margin-bottom: 15px; border-inline-start: 5px solid #ccc; background: #fff; }
    .section-forms { border-inline-start-color: #0d6efd; background: #f0f7ff; } 
    .section-uploads { border-inline-start-color: #fd7e14; background: #fff8f0; } 
    .section-transpo { border-inline-start-color: #0dcaf0; background: #f0fcfe; } 
    .section-title { font-weight: bold; color: #555; margin-bottom: 8px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-action { margin-top: 5px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; padding: 8px 12px; }
    .table td { padding: 10px 8px; border-bottom: 1px solid #e0e0e0; vertical-align: middle; }
    .doc-name { color: #444; font-size: 0.95rem; }
    .success-banner { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    .transpo-guide { font-size: 0.8rem; background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 10px; margin-top: 10px; }
    .transpo-guide summary { cursor: pointer; font-weight: bold; color: #004a99; outline: none; }
    .transpo-guide ul { padding-left: 1.2rem; margin-top: 8px; margin-bottom: 0; }
    .transpo-guide li { margin-bottom: 5px; }
    body[dir="rtl"] { text-align: right; }
    body[dir="rtl"] .lang-toggle { left: 15px; right: auto; }
  </style>
</head>
<body>
  <div id="searchBox" class="card p-0">
    <div class="card-header">
      <div class="lang-toggle">
        <select id="langSelect" class="form-select form-select-sm" onchange="syncLang(this)">
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ar">🇸🇦 العربية</option>
        </select>
      </div>
      <h3 class="mb-1 mt-2" id="t-title">BEAM Student Portal</h3>
      <p class="mb-0 small" id="t-subtitle">Check your registration progress and missing forms here</p>
    </div>
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label fw-bold" id="t-dob">Student Birthdate</label>
        <input type="date" id="dob" class="form-control">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold" id="t-email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="guardian@email.com">
      </div>
      <button onclick="runSearch()" id="btn" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Check Status</button>
      <div id="error" class="alert alert-warning mt-3 text-center hidden" style="font-size: 0.9rem;"></div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div class="card p-0">
      <div class="card-header">
         <div class="lang-toggle">
          <select id="langSelectResult" class="form-select form-select-sm" onchange="syncLang(this)">
            <option value="en">🇺🇸 English</option>
            <option value="es">🇪🇸 Español</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ar">🇸🇦 العربية</option>
          </select>
        </div>
        <h3 class="mb-1 mt-2" id="t-res-title">Student Portal</h3>
      </div>
      <div class="card-body p-4">
        <div id="content"></div>
        <button onclick="resetSearch()" id="t-back" class="btn btn-link w-100 mt-3 text-decoration-none">← Search Another Student</button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJyNKS0McK5fVMCP51_v37SZImaShhpE7T4F6MluK0zA9JM2X-m7S3tnsl02XpRUPg/exec";
    
    const SITE_DETAILS_UPTOWN = [
        "SELF/FAMILY: New Design HS (350 Grand St). Arrive 8-9 AM / Pick up 4:15 PM.",
        "Prospect Park (B/Q): Meet 8:20 AM / Drop off 4:40 PM (Lincoln Market).",
        "Canarsie-Rockaway Pkwy (L): Meet 8:09 AM / Drop off 4:51 PM (Armando's Pizza).",
        "Church Ave (B/Q): Meet 8:21 AM / Drop off 4:39 PM (El Centenario Pizza).",
        "Crown Hts-Utica (3/4): Meet 8:10 AM / Drop off 4:50 PM (Elevator entrance).",
        "Greenpoint Ave (G): Meet 8:11 AM / Drop off 4:49 PM (Pelicana Chicken).",
        "Myrtle-Willoughby Aves (G): Meet 8:12 AM / Drop off 4:48 PM (Falkowitz Cakes).",
        "36th St (D/N/R): Meet 8:20 AM / Drop off 4:40 PM (MTA Agent Booth).",
        "111th (7): Meet 7:55 AM / Drop off 5:05 PM (La Gitana #2).",
        "Grand Ave/Newtown (M/R): Meet 8:00 AM / Drop off 5:00 PM (Dunkin' Donuts)."
    ];

    const SITE_DETAILS_DOWNTOWN = [
        "SELF/FAMILY: Comp Sci High (447 Wales Ave). Arrive 8-9 AM / Pick up 4:15 PM.",
        "161st St-Yankee Stadium (4/B/D): Meet 8:14 AM / Drop off 4:46 PM (Heritage House).",
        "3rd Ave-149th St (2/5): Meet 8:28 AM / Drop off 4:32 PM (Bank of America).",
        "Burnside Ave (4): Meet 8:23 AM / Drop off 4:37 PM (Burnside Deli).",
        "Gun Hill Rd (2/5): Meet 8:03 AM / Drop off 4:57 PM (Dunkin' Donuts).",
        "Hunts Point Ave (6): Meet 8:25 AM / Drop off 4:35 PM (Popeyes).",
        "Kingsbridge Rd (4): Meet 8:16 AM / Drop off 4:44 PM (Jerome Pharmacy).",
        "Pelham Pkwy (2/5): Meet 8:12 AM / Drop off 4:48 PM (CVS Pharmacy).",
        "Tremont Ave (B/D): Meet 8:21 AM / Drop off 4:39 PM (Tremont Optometrist).",
        "West Farms Sq (2/5): Meet 8:20 AM / Drop off 4:40 PM (West Farms Deli)."
    ];

    const TRANSLATIONS = {
      en: {
        title: "BEAM Student Portal", dob: "Student Birthdate", email: "Email", btnCheck: "Check Status", btnSearching: "Searching...",
        errorNoStudent: "No matching student found.", statusFor: "Status for",
        errorConn: "Connection Issue. We couldn't verify automatically.", manualBtn: "Launch Secure Portal ↗",
        success: "🎉 Registration is complete!", timestamp: "Status as of",
        sectForms: "Registration Forms", sectUploads: "Document Uploads", sectTrans: "Transportation",
        btnForms: "Complete Forms Now", btnUploads: "Upload Missing Documents", btnBack: "← Search Another Student", 
        submitted: "Submitted", notSubmitted: "Not Submitted", missing: "Missing",
        am: "Morning Drop Off Method", pm: "Afternoon Pick Up Method", 
        change: "Change Transportation Method", complete: "Confirm Transportation Method",
        guideTitle: "View All Stop Information",
        docs: { "Parent Med": "Parent Medical Release", "Phys Med": "Physician's Medical Release", "Meningitis": "Meningitis Vaccine Acknowledgement", "Report Card": "7th Grade Report Card", "Immuno": "Immunization Record", "Ins Front": "Insurance Card (Front)", "Ins Back": "Insurance Card (Back)" }
      },
      es: {
        title: "Portal Estudiantil BEAM", dob: "Fecha de Nacimiento", email: "Correo Electrónico", btnCheck: "Verificar Estado", btnSearching: "Buscando...",
        errorNoStudent: "No se encontró ningún estudiante.", statusFor: "Estado de",
        errorConn: "Problema de conexión. No pudimos verificar automáticamente.", manualBtn: "Abrir Portal Seguro ↗",
        success: "🎉 ¡El registro está completo!", timestamp: "Estado al",
        sectForms: "Formularios de Registro", sectUploads: "Carga de Documentos", sectTrans: "Transporte",
        btnForms: "Completar Formularios Ahora", btnUploads: "Subir Documentos Faltantes", btnBack: "← Buscar Otro Estudiante", 
        submitted: "Enviado", notSubmitted: "No Enviado", missing: "Faltante",
        am: "Método de entrega por la mañana", pm: "Método de recogida por la tarde", 
        change: "Cambiar método de transporte", complete: "Confirmar método de transporte",
        guideTitle: "Ver información de todas las paradas",
        docs: { "Parent Med": "Autorización Médica de Padres", "Phys Med": "Autorización Médica del Médico", "Meningitis": "Reconocimiento de Vacuna contra la Meningitis", "Report Card": "Boleta (7º Grado)", "Immuno": "Registro de Inmunización", "Ins Front": "Seguro (Frente)", "Ins Back": "Seguro (Dorso)" }
      }
      // Chinese and Arabic can be maintained/added here
    };

    let currentLang = 'en';
    let currentResults = null;

    function syncLang(el) {
      document.getElementById('langSelect').value = el.value;
      document.getElementById('langSelectResult').value = el.value;
      changeLanguage();
    }

    function changeLanguage() {
      currentLang = document.getElementById('langSelect').value;
      const t = TRANSLATIONS[currentLang];
      document.body.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
      document.getElementById('t-title').innerText = t.title;
      document.getElementById('btn').innerText = t.btnCheck;
      document.getElementById('t-res-title').innerText = t.title;
      document.getElementById('t-back').innerText = t.btnBack;
      if (currentResults) render(currentResults);
    }

    function manualFallback() {
      const dob = document.getElementById('dob').value;
      const email = document.getElementById('email').value;
      const target = `${SCRIPT_URL}?dob=${encodeURIComponent(dob)}&email=${encodeURIComponent(email)}`;
      const chooserUrl = `https://accounts.google.com/AccountChooser?continue=${encodeURIComponent(target)}`;
      window.open(chooserUrl, '_blank');
    }

    function runSearch() {
      const dob = document.getElementById('dob').value;
      const email = document.getElementById('email').value;
      const btn = document.getElementById('btn');
      const errBox = document.getElementById('error');
      const t = TRANSLATIONS[currentLang];

      if(!dob || !email) return;

      btn.disabled = true;
      btn.innerText = t.btnSearching;
      errBox.classList.add('hidden');

      const oldScript = document.getElementById('jsonp_loader');
      if(oldScript) oldScript.remove();

      const script = document.createElement('script');
      script.id = 'jsonp_loader';
      script.setAttribute('crossorigin', 'anonymous');
      script.src = `${SCRIPT_URL}?callback=receiveData&dob=${encodeURIComponent(dob)}&email=${encodeURIComponent(email)}`;
      
      script.onerror = function() {
        btn.disabled = false;
        btn.innerText = t.btnCheck;
        errBox.innerHTML = `<strong>${t.errorConn}</strong><br><button onclick="manualFallback()" class="btn btn-dark btn-sm fw-bold w-100 mt-2">${t.manualBtn}</button>`;
        errBox.classList.remove('hidden');
      };

      document.body.appendChild(script);
    }

    window.receiveData = function(results) {
      const scriptTag = document.getElementById('jsonp_loader');
      if(scriptTag) scriptTag.remove(); 
      currentResults = results;
      render(results);
    };

    function render(results) {
      const t = TRANSLATIONS[currentLang];
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').innerText = t.btnCheck;
      if (!results || results.length === 0) {
        document.getElementById('error').innerHTML = t.errorNoStudent;
        document.getElementById('error').classList.remove('hidden');
        return;
      }
      document.getElementById('error').classList.add('hidden');
      
      const dateStr = new Date().toLocaleDateString() + ' 6:00 AM EST';
      let html = '';
      
      results.forEach(s => {
        const documentData = s.details.filter(d => !["Liability Waiver", "Media Release", "Code of Conduct", "Data Consent", "Attendance"].includes(d.name));
        const missingDocs = documentData.filter(d => d.status !== "Submitted").length;
        
        let transpoComplete = true;
        if (s.program === "Discovery") {
          if (!s.transportation.morning || s.transportation.morning === "Missing" || !s.transportation.afternoon || s.transportation.afternoon === "Missing") transpoComplete = false;
        }

        html += `<h4 class="text-primary fw-bold text-center mb-1">${t.statusFor} ${s.firstName}</h4>`;
        html += `<div class="text-center mb-3"><span class="badge bg-secondary rounded-pill">${s.program}</span></div>`;
        html += `<p class="timestamp text-center small text-muted">${t.timestamp}: ${dateStr}</p>`;
        
        // Forms Table
        html += `<div class="section-box section-forms"><div class="section-title">${t.sectForms}</div><table class="table table-sm mb-0"><tr><td class="doc-name">Registration & Consent Forms</td><td class="text-end status-Submitted">${t.submitted}</td></tr></table></div>`;

        // Uploads
        html += `<div class="section-box section-uploads"><div class="section-title">${t.sectUploads}</div><table class="table table-sm mb-0">`;
        documentData.forEach(d => {
            html += `<tr><td class="doc-name">${t.docs[d.name] || d.name}</td><td class="${d.status === 'Submitted' ? 'status-Submitted' : 'status-Not-Submitted'} text-end">${d.status === 'Submitted' ? t.submitted : t.notSubmitted}</td></tr>`;
        });
        html += `</table>`;
        if (missingDocs > 0) html += `<a href="https://www.surveymonkey.com/r/9GYMKBM" target="_blank" class="btn btn-warning btn-action w-100 mt-2 text-white">${t.btnUploads}</a>`;
        html += `</div>`;

        // Transportation
        if (s.program === "Discovery" && s.transportation) {
            const isUT = (s.transportation.location || "").toLowerCase().includes("uptown");
            const surveyUrl = isUT ? "https://www.surveymonkey.com/r/RRNN52J" : "https://www.surveymonkey.com/r/RSHRS9Q";
            const detailsList = isUT ? SITE_DETAILS_UPTOWN : SITE_DETAILS_DOWNTOWN;
            const hasSub = transpoComplete;

            html += `<div class="section-box section-transpo">
                      <div class="section-title">${t.sectTrans} (${isUT ? 'Uptown' : 'Downtown'})</div>
                      <table class="table table-sm mb-0">
                        <tr><td class="doc-name">${t.am}</td><td class="${!s.transportation.morning || s.transportation.morning === 'Missing' ? 'status-Missing' : ''} text-end">${s.transportation.morning || t.missing}</td></tr>
                        <tr><td class="doc-name">${t.pm}</td><td class="${!s.transportation.afternoon || s.transportation.afternoon === 'Missing' ? 'status-Missing' : ''} text-end">${s.transportation.afternoon || t.missing}</td></tr>
                      </table>
                      <a href="${surveyUrl}" target="_blank" class="btn btn-info btn-action w-100 mt-2 text-white" style="background-color: #0dcaf0; border: none;">${hasSub ? t.change : t.complete}</a>
                      
                      <details class="transpo-guide">
                        <summary>${t.guideTitle}</summary>
                        <ul>${detailsList.map(item => `<li>${item}</li>`).join('')}</ul>
                      </details>
                    </div>`;
        }
        html += `<hr class="my-4">`;
      });
      document.getElementById('content').innerHTML = html;
      document.getElementById('searchBox').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
    }

    function resetSearch() {
      document.getElementById('results').classList.add('hidden');
      document.getElementById('searchBox').classList.remove('hidden');
      currentResults = null;
    }
  </script>
</body>
</html>
