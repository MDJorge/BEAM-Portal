<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <title>BEAM Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f9; padding: 20px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .hidden { display: none; }
    .card { border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: auto; background: white; }
    .card-header { background: #004a99; color: white; padding: 20px; border-radius: 12px 12px 0 0; position: relative; }
    .lang-toggle { position: absolute; top: 15px; right: 15px; }
    .status-Submitted { color: #198754 !important; font-weight: bold; }
    .status-Not-Submitted, .status-Missing { color: #dc3545 !important; font-weight: bold; }
    .section-box { border-radius: 8px; padding: 15px; margin-bottom: 15px; border-inline-start: 5px solid #ccc; background: #fff; }
    .section-forms { border-inline-start-color: #0d6efd; background: #f0f7ff; } 
    .section-transpo { border-inline-start-color: #0dcaf0; background: #f0fcfe; }
    .btn-action { margin-top: 5px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; padding: 8px 12px; }
    body[dir="rtl"] { text-align: right; }
  </style>
</head>
<body>

  <div id="searchBox" class="card">
    <div class="card-header">
      <div class="lang-toggle">
        <select id="langSelect" class="form-select form-select-sm" onchange="changeLanguage()">
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ar">🇸🇦 العربية</option>
        </select>
      </div>
      <h3 id="t-title">BEAM Student Portal</h3>
      <p id="t-subtitle">Check your progress here</p>
    </div>
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label fw-bold" id="t-dob">Student Birthdate</label>
        <input type="date" id="dob" class="form-control">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold" id="t-email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="guardian@email.com">
      </div>
      <button onclick="runSearch()" id="btn" class="btn btn-primary w-100 fw-bold">Check Status</button>
      <div id="error" class="alert alert-warning mt-3 hidden"></div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div class="card">
      <div class="card-body p-4">
        <div id="content"></div>
        <button onclick="resetSearch()" id="t-back" class="btn btn-link w-100">← Back</button>
      </div>
    </div>
  </div>

  <script>
    // MAKE SURE TO UPDATE THIS URL AFTER RE-DEPLOYING THE SCRIPT
    const SCRIPT_URL = "YOUR_WEB_APP_URL_HERE";

    const TRANSLATIONS = {
      en: {
        title: "BEAM Student Portal", subtitle: "Check your registration progress here",
        dob: "Student Birthdate", email: "Email", btnCheck: "Check Status", btnSearching: "Searching...",
        errorNoStudent: "No matching student found.", statusFor: "Status for",
        sectForms: "Forms", sectTrans: "Transportation", submitted: "Submitted", notSubmitted: "Not Submitted",
        missing: "Missing", am: "Morning Bus", pm: "Afternoon Bus", change: "Change Stops", complete: "Confirm Stops",
        btnBack: "← Search Another Student",
        docs: { "Parent Med": "Parent Medical", "Phys Med": "Physician Medical", "Meningitis": "Meningitis Form", "Report Card": "Report Card", "Immuno": "Immunizations", "Ins Front": "Insurance (Front)", "Ins Back": "Insurance (Back)" }
      },
      es: {
        title: "Portal Estudiantil BEAM", subtitle: "Verifique su progreso de registro",
        dob: "Fecha de Nacimiento", email: "Correo Electrónico", btnCheck: "Verificar Estado", btnSearching: "Buscando...",
        errorNoStudent: "No se encontró ningún estudiante.", statusFor: "Estado de",
        sectForms: "Formularios", sectTrans: "Transporte", submitted: "Enviado", notSubmitted: "No Enviado",
        missing: "Faltante", am: "Bus de la mañana", pm: "Bus de la tarde", change: "Cambiar paradas", complete: "Confirmar paradas",
        btnBack: "← Buscar Otro Estudiante",
        docs: { "Parent Med": "Médico Padres", "Phys Med": "Médico Doctor", "Meningitis": "Meningitis", "Report Card": "Boleta", "Immuno": "Inmunización", "Ins Front": "Seguro (Frente)", "Ins Back": "Seguro (Dorso)" }
      },
      zh: {
        title: "BEAM 学生门户", subtitle: "在此查看您的注册进度",
        dob: "学生出生日期", email: "电子邮件", btnCheck: "查看状态", btnSearching: "搜索中...",
        errorNoStudent: "未找到匹配的学生。", statusFor: "状态：",
        sectForms: "表格", sectTrans: "交通", submitted: "已提交", notSubmitted: "未提交",
        missing: "缺失", am: "上午巴士", pm: "下午巴士", change: "更改巴士站", complete: "确认选择",
        btnBack: "← 搜索另一名学生",
        docs: { "Parent Med": "家长医疗", "Phys Med": "医生医疗", "Meningitis": "脑膜炎确认书", "Report Card": "成绩单", "Immuno": "免疫记录", "Ins Front": "保险卡 (正面)", "Ins Back": "保险卡 (背面)" }
      },
      ar: {
        title: "بوابة طلاب BEAM", subtitle: "تحقق من تقدم التسجيل هنا",
        dob: "تاريخ ميلاد الطالب", email: "البريد الإلكتروني", btnCheck: "التحقق من الحالة", btnSearching: "جاري البحث...",
        errorNoStudent: "لم يتم العثور على طالب.", statusFor: "الحالة لـ",
        sectForms: "نماذج", sectTrans: "المواصلات", submitted: "تم الإرسال", notSubmitted: "لم يتم الإرسال",
        missing: "مفقود", am: "حافلة الصباح", pm: "حافلة المساء", change: "تغيير المواقف", complete: "تأكيد المواقف",
        btnBack: "← البحث عن طالب آخر",
        docs: { "Parent Med": "طبي الوالدين", "Phys Med": "طبي الطبيب", "Meningitis": "التهاب السحايا", "Report Card": "الشهادة", "Immuno": "التطعيمات", "Ins Front": "التأمين (الأمام)", "Ins Back": "التأمين (الخلف)" }
      }
    };

    let currentLang = 'en';
    let currentResults = null;

    function changeLanguage() {
      currentLang = document.getElementById('langSelect').value;
      const t = TRANSLATIONS[currentLang];
      document.body.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
      document.getElementById('t-title').innerText = t.title;
      document.getElementById('t-subtitle').innerText = t.subtitle;
      document.getElementById('t-dob').innerText = t.dob;
      document.getElementById('t-email').innerText = t.email;
      document.getElementById('btn').innerText = t.btnCheck;
      document.getElementById('t-back').innerText = t.btnBack;
      if (currentResults) render(currentResults);
    }

    function runSearch() {
      const dob = document.getElementById('dob').value;
      const email = document.getElementById('email').value;
      if(!dob || !email) return;
      document.getElementById('btn').innerText = TRANSLATIONS[currentLang].btnSearching;
      const script = document.createElement('script');
      script.id = 'jsonp_loader';
      script.src = `${SCRIPT_URL}?callback=receiveData&dob=${encodeURIComponent(dob)}&email=${encodeURIComponent(email)}`;
      document.body.appendChild(script);
    }

    window.receiveData = function(results) {
      if(document.getElementById('jsonp_loader')) document.getElementById('jsonp_loader').remove();
      currentResults = results;
      render(results);
    };

    function render(results) {
      const t = TRANSLATIONS[currentLang];
      document.getElementById('btn').innerText = t.btnCheck;
      if (!results || results.length === 0) {
        document.getElementById('error').innerText = t.errorNoStudent;
        document.getElementById('error').classList.remove('hidden');
        return;
      }
      document.getElementById('error').classList.add('hidden');
      let html = '';
      results.forEach(s => {
        html += `<h4 class="text-center">${t.statusFor} ${s.firstName}</h4>`;
        
        // Forms Logic
        const missingForms = s.details.filter(d => ["Liability Waiver", "Media Release"].includes(d.name) && d.status !== "Submitted").length;
        html += `<div class="section-box section-forms">
                  <div>${t.sectForms}</div>
                  <div class="d-flex justify-content-between">
                    <span>Forms</span>
                    <span class="${missingForms === 0 ? 'status-Submitted' : 'status-Not-Submitted'}">${missingForms === 0 ? t.submitted : t.notSubmitted}</span>
                  </div>
                </div>`;

        // Transpo Logic
        if (s.program === "Discovery" && s.transportation) {
            const isUT = (s.transportation.location || "").toLowerCase().includes("ut");
            const surveyUrl = isUT ? "https://www.surveymonkey.com/r/RRNN52J" : "https://www.surveymonkey.com/r/RSHRS9Q";
            html += `<div class="section-box section-transpo">
                      <div>${t.sectTrans} (${isUT ? 'Uptown' : 'Downtown'})</div>
                      <div class="small">AM: ${s.transportation.morning || t.missing}</div>
                      <div class="small">PM: ${s.transportation.afternoon || t.missing}</div>
                      <a href="${surveyUrl}" target="_blank" class="btn btn-info btn-action w-100 text-white">${t.change}</a>
                    </div>`;
        }
      });
      document.getElementById('content').innerHTML = html;
      document.getElementById('searchBox').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
    }

    function resetSearch() {
      document.getElementById('results').classList.add('hidden');
      document.getElementById('searchBox').classList.remove('hidden');
    }
  </script>
</body>
</html>
